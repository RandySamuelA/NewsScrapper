name: 📰 Daily News Digest

on:
  # Jadwal: setiap hari jam 23:00 UTC (hari sebelumnya) = 06:00 WIB
  # Dikurangi 1 jam dari target (07:00 WIB) untuk kompensasi delay GitHub Actions
  # yang biasanya 30-60 menit pada free tier
  schedule:
    - cron: "0 23 * * *"

  # Tombol manual di GitHub UI (untuk testing)
  workflow_dispatch:

jobs:
  send-news-digest:
    name: Scrape & Send News Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🕐 Show current time (UTC & WIB)
        run: |
          echo "UTC  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "WIB  : $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')"

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📰 Run News Scraper & Send Email
        env:
          EMAIL_USER:       ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
        run: python src/main.py --run-now

      - name: 📋 Upload logs (jika ada error)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-scraper-logs
          path: logs/
          retention-days: 7
