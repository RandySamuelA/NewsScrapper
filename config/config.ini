# config.ini
# File ini AMAN untuk di-push ke GitHub karena tidak mengandung password.
# Kredensial email (EMAIL_USER, EMAIL_PASSWORD, RECIPIENT_EMAIL) disimpan
# di GitHub Secrets dan di-inject via environment variables saat runtime.

[email]
smtp_host = smtp.gmail.com
smtp_port = 587
# email_user, email_password, recipient_email diisi dari env vars / GitHub Secrets
# Jika ingin jalankan lokal, uncomment dan isi nilai di bawah:
# email_user     = your_email@gmail.com
# email_password = xxxx xxxx xxxx xxxx
# recipient_email = destination@gmail.com

[news]
rss_sources =
    https://feeds.bbci.co.uk/news/rss.xml,
    https://feeds.bbci.co.uk/news/technology/rss.xml,
    https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml,
    https://techcrunch.com/feed/,
    https://news.google.com/rss?hl=id&gl=ID&ceid=ID:id

max_articles_per_source = 5
summary_language = id
schedule_time = 07:00

[summarizer]
method = extractive
extractive_sentences = 3

[settings]
log_file = logs/app.log
output_dir = data/output
